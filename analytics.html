<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <h1>Analytics</h1>
    </div>

    <button id="techBtn" class="tech-btn" onclick="handleTechButton()">
      Technician
    </button>
  </div>

  <div class="layout">

    <div class="sidebar" id="sidebar">
      <h2 class="logo">IT Desk</h2>

      <button onclick="goHome()">Dashboard</button>
      <button onclick="goToCheckIn()">Request Ticket</button>

      <div id="techLinks" style="display: none;">
        <button onclick="goToAnalytics()">Analytics</button>
        <button onclick="goToQueue()">Queue</button>
      </div>
    </div>

    <div class="main">

      <div class="welcome-box">
        <h1>Analytics Overview</h1>
      </div>

      <div class="card-grid">
        <div class="stat-card">
          <h3>Total Tickets</h3>
          <p id="totalTickets">0</p>
        </div>

        <div class="stat-card">
          <h3>Active Tickets</h3>
          <p id="activeTickets">0</p>
        </div>

        <div class="stat-card">
          <h3>On Hold Tickets</h3>
          <p id="holdTickets">0</p>
        </div>

        <div class="stat-card">
          <h3>Resolved Tickets</h3>
          <p id="resolvedTickets">0</p>
        </div>
      </div>

      <div class="section-box">
        <h2>Category Breakdown</h2>
        <div id="categoryBreakdown"></div>
      </div>

    </div>
  </div>

  <script src="js/navigation.js"></script>
  <script>
    protectTechnicianPage();
  </script>
  <script src="js/analytics.js"></script>

</body>
</html>
